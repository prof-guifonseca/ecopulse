name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Non-blocking quality gate: assertions are "warn", so the job reports
      # scores (with a temporary public report URL) without failing the PR.
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
